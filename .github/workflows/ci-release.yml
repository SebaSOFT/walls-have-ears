name: CI and Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate (Lint, Test, Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable --inline-builds

      - name: Run linter
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Verify Version Consistency
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          MODULE_VERSION=$(jq -r .version module.json)
          echo "Package version: $PACKAGE_VERSION"
          echo "Module version: $MODULE_VERSION"
          if [ "$PACKAGE_VERSION" != "$MODULE_VERSION" ]; then
            echo "Error: Version mismatch between package.json ($PACKAGE_VERSION) and module.json ($MODULE_VERSION)"
            exit 1
          fi

      - name: Build project
        run: yarn build

      - name: Upload Build Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            module.json
            LICENSE
            lang/
            artwork/*.webp

  release:
    name: Create Release and Publish
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get module version
        id: get_version
        run: echo "version=$(jq -r .version module.json)" >> $GITHUB_OUTPUT

      # Substitute the Manifest and Download URLs in the module.json
      - name: Substitute Manifest and Download Links For Versioned Ones
        id: sub_manifest_link_version
        uses: microsoft/variable-substitution@v1
        with:
          files: 'module.json'
        env:
          version: ${{ steps.get_version.outputs.version }}
          url: https://github.com/${{github.repository}}
          manifest: https://github.com/${{github.repository}}/releases/latest/download/module.json
          download: https://github.com/${{github.repository}}/releases/download/${{ steps.get_version.outputs.version }}/module.zip

      # Create a zip file with all files required by the module to add to the release
      - run: zip -r ./module.zip module.json LICENSE dist/ lang/ artwork/*.webp

      # Create a release for this specific version
      - name: Create Release
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generateReleaseNotes: true # Automatically generate release notes
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{ steps.get_version.outputs.version }}

      - name: Publish Module to FoundryVTT Website
        id: publish-to-foundry-website
        uses: cs96and/FoundryVTT-release-package@v1
        with:
          package-token: ${{ secrets.FVTT_TOKEN }}
          manifest-url: https://github.com/${{github.repository}}/releases/download/${{ steps.get_version.outputs.version }}/module.json
